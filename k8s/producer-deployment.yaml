apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer
  namespace: liveclass
  labels:
    app: producer
spec:
  # 이벤트 생성기는 1개만 실행 — 복수 실행 시 이벤트 수가 배수로 증가해 파이프라인 부하가 생김
  replicas: 1
  selector:
    matchLabels:
      app: producer
  template:
    metadata:
      labels:
        app: producer
    spec:
      containers:
        - name: producer
          image: juxpkr/liveclass-producer:latest
          imagePullPolicy: Always
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: producer-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: KAFKA_TOPIC
              valueFrom:
                configMapKeyRef:
                  name: producer-config
                  key: KAFKA_TOPIC
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
