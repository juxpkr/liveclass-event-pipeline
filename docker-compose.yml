services:
  kafka:
    image: public.ecr.aws/bitnami/kafka:3.6.2-debian-12-r5
    container_name: kafka
    # 채점자의 환경(Windows, Intel Mac) 및 Apple Silicon(M1/M2/M3) 환경 
    # 모두에서 동일하게 작동하도록 아키텍처를 강제 지정
    platform: linux/amd64
    ports:
      - "9094:9094" # 외부(로컬 PC) 접근용 포트
    environment:
      # KRaft mode
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093

      # Listeners: 컨테이너 내부는 9092, 외부는 9094
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Local development only
      ALLOW_PLAINTEXT_LISTENER: "yes"
      # Topic settings
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Retention
      KAFKA_CFG_LOG_RETENTION_HOURS: 24
    
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 10
    volumes:
      - kafka_data:/bitnami/kafka

  minio:
    image: public.ecr.aws/bitnami/minio:2024.11.7-debian-12-r0
    container_name: minio
    platform: linux/amd64
    ports:
      - "9000:9000" # API 포트
      - "9001:9001" # Console 포트
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_DEFAULT_BUCKETS: warehouse # 기본 버킷 자동 생성
    
    volumes:
      - minio_data:/bitnami/minio/data
    healthcheck:
      test: ["CMD", "/opt/bitnami/minio-client/bin/mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
  # 이벤트 생성기(Python) 컨테이너
  producer:
    build: ./producer
    container_name: producer
    platform: linux/amd64
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: liveclass-events
      EVENT_COUNT: 1000
    depends_on:
      kafka:
        condition: service_healthy


  spark-consumer:
    build: ./spark-consumer
    container_name: spark-consumer
    platform: linux/amd64
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: liveclass-events
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      BRONZE_PATH: s3a://warehouse/bronze/events
      SILVER_PATH: s3a://warehouse/silver/events
      CHECKPOINT_PATH: s3a://warehouse/checkpoints/consumer
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
        
  gold-processor:
    build: ./gold-processor
    container_name: gold-processor
    platform: linux/amd64
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      BRONZE_PATH: s3a://warehouse/bronze/events
      SILVER_PATH: s3a://warehouse/silver/events
      GOLD_QUALITY_PATH: s3a://warehouse/gold/data_quality_metrics
      GOLD_FUNNEL_PATH: s3a://warehouse/gold/funnel_metrics
      GOLD_COURSE_PATH: s3a://warehouse/gold/course_metrics
      GOLD_UPDATE_INTERVAL_SECONDS: 30
    depends_on:
      minio:
        condition: service_healthy
      spark-consumer:
        condition: service_started




  dashboard:
    build: ./dashboard
    container_name: dashboard
    platform: linux/amd64
    ports:
      - "8501:8501"
    volumes:
      - ./dashboard:/app
    command: streamlit run Overview.py --server.fileWatcherType poll --server.runOnSave true
    environment:
      SILVER_PATH: s3://warehouse/silver/events
      GOLD_QUALITY_PATH: s3://warehouse/gold/data_quality_metrics
      GOLD_FUNNEL_PATH: s3://warehouse/gold/funnel_metrics
      GOLD_COURSE_PATH: s3://warehouse/gold/course_metrics

      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_REGION: us-east-1
    depends_on:
      minio:
        condition: service_healthy
      spark-consumer:
        condition: service_started
  
volumes:
  kafka_data:
  minio_data: